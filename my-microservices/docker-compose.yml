
services:
  # ==========================================
  # INFRASTRUKTUR
  # ==========================================

  ## PostgreSQL (Satu DB, Banyak Schema)
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    deploy:
      resources:
        limits:
          memory: 256M   # Batasi RAM PostgreSQL
        reservations:
          memory: 128M

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    # --save "" → matikan persistence agar lebih ringan (cukup untuk dev)
    networks:
      - microservices-network
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 96M
        reservations:
          memory: 32M

  # Kafka - confluentinc dengan resource limit ketat untuk laptop
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      # --- KRaft mode ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # --- Listeners ---
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # --- Topic defaults (dikurangi untuk dev) ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1          # dikurangi dari 3 → hemat RAM

      # --- Hemat disk & RAM untuk dev ---
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_SEGMENT_BYTES: 104857600   # 100 MB (dari 1 GB)
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 60000

      # --- JVM heap dikurangi drastis (kunci utama hemat RAM) ---
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"

      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - microservices-network
    deploy:
      resources:
        limits:
          memory: 512M   # hard cap agar tidak makan RAM sembarangan
        reservations:
          memory: 256M

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092 # pakai listener INTERNAL
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - microservices-network

  # prometheus:
