  # ==========================================
  # MICROSERVICES APLIKASI
  # ==========================================

  # Bank Service
  bank-service:
    build:
      context: .
      dockerfile: ./bank-service/Dockerfile
    container_name: app-bank-service
    environment:
      APP_ADDR: "0.0.0.0"
      APP_PORT: ${APP_PORT}
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      DB_SCHEMA: bank_schema
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4317"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      MIGRATIONS_PATH: "file:///app/migrations"
      KAFKA_BROKERS: "kafka:29092"
      ACCOUNT_GRPC_ADDR: "account-service:50051"
      TRANSACTION_GRPC_ADDR: "transaction-service:50051"
    ports:
      - "8081:8080"
      - "50051:50051"
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - microservices-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  # Account Service
  account-service:
    build:
      context: .
      dockerfile: ./account-service/Dockerfile
    container_name: app-account-service
    environment:
      APP_ADDR: "0.0.0.0"
      APP_PORT: ${APP_PORT}
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      DB_SCHEMA: account_schema
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4317"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      MIGRATIONS_PATH: "file:///app/migrations"
      KAFKA_BROKERS: "kafka:29092"
      BANK_GRPC_ADDR: "bank-service:50051"
      TRANSACTION_GRPC_ADDR: "transaction-service:50051"
    ports:
      - "8082:8080"
      - "50052:50051"
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - microservices-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  # Transaction Service
  transaction-service:
    build:
      context: .
      dockerfile: ./transaction-service/Dockerfile
    container_name: app-transaction-service
    environment:
      APP_ADDR: "0.0.0.0"
      APP_PORT: ${APP_PORT}
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      DB_SCHEMA: transaction_schema
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4317"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      MIGRATIONS_PATH: "file:///app/migrations"
      KAFKA_BROKERS: "kafka:29092"
      BANK_GRPC_ADDR: "bank-service:50051"
      ACCOUNT_GRPC_ADDR: "account-service:50051"
      FRAUD_GRPC_ADDR: "fraud-service:50051"
    ports:
      - "8083:8080"
      - "50053:50051"
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      fraud-service:
        condition: service_started
    networks:
      - microservices-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  # Notification Service (gRPC Server)
  notification-service:
    build:
      context: ./notification-service
    container_name: app-notification-service
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      DB_SCHEMA: notification_schema
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_GROUP_ID: "notification-group"
      CALLBACK_TIMEOUT_SECONDS: 15
      CALLBACK_MAX_RETRIES: 3
      MIGRATIONS_PATH: "file:///root/migrations"
      # OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4317"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - microservices-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  # Fraud Service (gRPC Server)
  fraud-service:
    build:
      context: .
      dockerfile: ./fraud-service/Dockerfile
    container_name: app-fraud-service
    environment:
      APP_PORT: 50051
      KAFKA_BROKERS: "kafka:29092"
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "50054:50051"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - microservices-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

# ==========================================
# JARINGAN INTERNAL (NETWORK)
# ==========================================
networks:
  microservices-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
